<div class="main">
<h1>Products</h1>

<input type="text" id="search" placeholder="Search..." onkeyup="loadProducts()">
<input type="text" id="rackFilter" list="rackFilterOptions" placeholder="All Racks" oninput="loadProducts()">
<datalist id="rackFilterOptions">
<option value="All Racks"></option>
<option value="Rack 1"></option>
<option value="Rack 2"></option>
<option value="Rack 3"></option>
</datalist>

<h2>Add Product</h2>
<form id="addProductForm" onsubmit="addProduct(event)">
<input type="text" id="name" placeholder="Product Name" required>
<input type="number" id="quantity" placeholder="Quantity" required>
<input type="number" id="price" placeholder="Price" required>
<input type="number" id="cost" placeholder="Cost" required>
<input type="text" id="rack" placeholder="Rack 1" required>
<input type="text" id="shelf" placeholder="Shelf A" required>
<input type="file" id="image" accept="image/*" multiple required hidden>
<label for="image" class="add-image-square product-image-upload" aria-label="Choose product images" ondblclick="submitProductFromIcon(event)"></label>
<button id="addProductSubmitBtn" type="submit" style="color: transparent; background-color: transparent;">Add</button>
</form>

<div class="card-box" id="productContainer"></div>

</div>

<script src="script.js"></script>
